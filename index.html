<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>CMA Dynamic Structural Visualization Prototype v3.2 — Agency & Connection Layer</title>

<style>
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#000;color:#ddd;font-family:system-ui,-apple-system,sans-serif}
canvas{display:block}
#info{position:fixed;top:16px;left:22px;font-size:10px;color:rgba(255,255,255,0.45);z-index:10;line-height:1.55;max-width:380px}
#timeSliderContainer{position:fixed;top:16px;right:22px;background:rgba(0,0,0,0.7);padding:10px 14px;border-radius:6px;border:1px solid rgba(255,255,255,0.1);z-index:50}
#controls{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.75);padding:8px 12px;border-radius:8px;border:1px solid rgba(255,255,255,0.1);display:flex;gap:6px;flex-wrap:wrap;z-index:100}
button{background:rgba(255,255,255,0.08);color:#ddd;border:1px solid rgba(255,255,255,0.18);padding:6px 11px;font-size:10px;border-radius:4px;cursor:pointer}
button:hover{background:rgba(255,255,255,0.15)}
#layerInfo{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);max-width:460px;background:rgba(6,6,6,0.96);border:1px solid rgba(111,240,192,0.35);border-radius:8px;padding:22px 26px;display:none;z-index:200}
</style>
</head>
<body>

<div id="info">
CMA Dynamic Structural Visualization Prototype v3.2<br>
<strong>Agency & Connection Layer（主体性再形成の条件）</strong><br>
Witness Mode × Structural History × Network Growth<br>
<br>
これは「見る・操作する研究補助ツール」です。<br>
同じ構造でも観察位置によって回復条件の見え方が変わります。
</div>

<div id="timeSliderContainer">
  <label style="font-size:9px;color:#aaa">Connection Availability（接続可能性の進行）</label><br>
  <input type="range" id="timeSlider" min="0" max="100" value="40" style="width:240px">
  <span id="timeLabel" style="font-size:9px;margin-left:8px">Expansion Phase</span>
</div>

<canvas id="c"></canvas>

<div id="controls">
  <button onclick="togglePause()" id="pauseBtn">Pause</button>
  <button onclick="toggleReduceMotion()" id="motionBtn">Static Mode</button>
  <button onclick="setWitnessMode(0)">Survivor</button>
  <button onclick="setWitnessMode(1)">Family</button>
  <button onclick="setWitnessMode(2)">Institution</button>
  <button onclick="setWitnessMode(3)">Supporter</button>
  <button onclick="setWitnessMode(4)">Researcher</button>
  <button onclick="resetAll()">Reset</button>
</div>

<div id="layerInfo">
  <button onclick="closeLayerInfo()" style="position:absolute;top:12px;right:14px;background:none;border:none;color:#888;font-size:20px;cursor:pointer">×</button>
  <h3 id="layerName"></h3>
  <div id="layerMeta" style="font-size:9px;color:#888;margin-bottom:12px"></div>
  <div style="margin-bottom:12px"><div style="color:#5ab8ff;font-size:9px">STRUCTURAL FUNCTION</div><p id="layerFunction" style="margin:4px 0 0 0"></p></div>
  <div style="margin-bottom:12px"><div style="color:#5ab8ff;font-size:9px">GUIDING QUESTION</div><p id="layerQuestion" style="margin:4px 0 0 0"></p></div>
  <div><div style="color:#6ff0c0;font-size:9px">RECOVERY CONDITIONS</div><p id="layerRecovery" style="margin:4px 0 0 0;color:#aaffcc"></p></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ============================================================
// CMA v3.2 - Fixed Camera + Larger Radius Version
// ============================================================

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);
scene.fog = new THREE.Fog(0x000000, 900, 4200);

const camera = new THREE.PerspectiveCamera(56, window.innerWidth / window.innerHeight, 0.1, 6000);
// Camera Fix
camera.position.set(0, 35, 520);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Layer Data with larger radius
const layerData = [
  {name:"Isolation", radius:180, baseSpeed:0.00065, color:0x5ab8ff, rotationAxis:"x"},
  {name:"Dependency", radius:145, baseSpeed:-0.00092, color:0xffc45a, rotationAxis:"y"},
  {name:"Normalization", radius:110, baseSpeed:0.00078, color:0xc285ff, rotationAxis:"z"},
  {name:"Institutional Non-Responsiveness", radius:75, baseSpeed:-0.00068, color:0xff7070, rotationAxis:"xy"},
  {name:"Somatization", radius:45, baseSpeed:0.0011, color:0x6ff0c0, rotationAxis:"yz"}
];

let layerObjects = [];
let recoveryParticles;
let potentialEdges = [];
let activeConnections = [];
let isPaused = false;
let reduceMotion = false;
let currentTime = 40;
let currentWitness = -1;

function createLayers() {
  layerData.forEach((data) => {
    const group = new THREE.Group();
    const mat = new THREE.LineBasicMaterial({color: data.color, transparent: true, opacity: 1.0});
    const r = data.radius;
    const positions = [];
    for (let i = 0; i <= 32; i++) {
      const a = (i / 32) * Math.PI * 2;
      positions.push(r * Math.cos(a), r * Math.sin(a), 95);
      positions.push(r * Math.cos(a), r * Math.sin(a), -95);
    }
    const geom = new THREE.BufferGeometry().setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
    group.add(new THREE.Line(geom, mat));
    scene.add(group);
    layerObjects.push({data, group, angle: Math.random() * 6, baseSpeed: data.baseSpeed});
  });
}

function createAgencyConnectionLayer() {
  const count = 42;
  const positions = new Float32Array(count * 3);
  const baseR = 210;
  for (let i = 0; i < count; i++) {
    const a = (i / count) * Math.PI * 2;
    positions[i*3] = baseR * Math.cos(a) + (Math.random()-0.5)*12;
    positions[i*3+1] = baseR * Math.sin(a) + (Math.random()-0.5)*12;
    positions[i*3+2] = (Math.random()-0.5)*40;
  }
  const geo = new THREE.BufferGeometry().setAttribute('position', new THREE.BufferAttribute(positions, 3));
  const mat = new THREE.PointsMaterial({color: 0xaaffcc, size: 4.8, transparent: true, opacity: 0.88});
  recoveryParticles = new THREE.Points(geo, mat);
  scene.add(recoveryParticles);

  potentialEdges = [];
  for (let i = 0; i < count; i++) {
    for (let j = i+1; j < count; j++) {
      const dist = Math.hypot(positions[i*3]-positions[j*3], positions[i*3+1]-positions[j*3+1]);
      if (dist < 65 && Math.random() > 0.55) potentialEdges.push([i, j]);
    }
  }
}

function updateConnectionGrowth(availability) {
  activeConnections.forEach(l => scene.remove(l));
  activeConnections = [];
  if (!recoveryParticles || reduceMotion) return;
  const pos = recoveryParticles.geometry.attributes.position.array;
  const max = Math.floor(potentialEdges.length * (availability / 100));
  for (let i = 0; i < max; i++) {
    const [a, b] = potentialEdges[i];
    const lineGeo = new THREE.BufferGeometry().setAttribute('position', new THREE.Float32BufferAttribute([
      pos[a*3], pos[a*3+1], pos[a*3+2],
      pos[b*3], pos[b*3+1], pos[b*3+2]
    ],3));
    const line = new THREE.Line(lineGeo, new THREE.LineBasicMaterial({color:0xaaffcc, transparent:true, opacity:0.35 + (availability/100)*0.45}));
    scene.add(line);
    activeConnections.push(line);
  }
}

function updateAvailability(val) {
  currentTime = val;
  const t = val / 100;
  document.getElementById('timeLabel').textContent = t < 0.3 ? "Low Availability" : t < 0.65 ? "Emerging Connections" : "High Density";
  layerObjects.forEach(obj => obj.group.scale.setScalar(0.92 + t * 0.28));
  updateConnectionGrowth(val);
}

function applyWitnessToRecovery() {
  if (!recoveryParticles) return;
  const m = currentWitness;
  if (m === 0) { recoveryParticles.material.size = 5.5; recoveryParticles.material.opacity = 0.92; }
  else if (m === 2) { recoveryParticles.material.size = 3.2; recoveryParticles.material.opacity = 0.6; }
  else { recoveryParticles.material.size = 4.5; recoveryParticles.material.opacity = 0.85; }
}

let lastTime = performance.now();
function animate(now) {
  if (isPaused) { requestAnimationFrame(animate); return; }
  const elapsed = (now - lastTime) * 0.001;
  lastTime = now;

  layerObjects.forEach(obj => {
    if (!reduceMotion) obj.angle += obj.baseSpeed * 55;
    obj.group.rotation.y = obj.angle * 0.7;
  });

  if (!reduceMotion) applyWitnessToRecovery();

  renderer.render(scene, camera);
  requestAnimationFrame(animate);
}

function togglePause() { isPaused = !isPaused; document.getElementById('pauseBtn').textContent = isPaused ? "Resume" : "Pause"; }
function toggleReduceMotion() {
  reduceMotion = !reduceMotion;
  document.getElementById('motionBtn').textContent = reduceMotion ? "Static Mode: ON" : "Static Mode";
  if (reduceMotion) updateConnectionGrowth(0);
  else updateAvailability(currentTime);
}
function setWitnessMode(mode) { currentWitness = mode; applyWitnessToRecovery(); }
function resetAll() { location.reload(); }

// Init
createLayers();
createAgencyConnectionLayer();
updateAvailability(40);
requestAnimationFrame(animate);

console.log('%c[CMA v3.2] Camera Fixed + Larger Radius + Opacity 1.0 - Ready', 'color:#6ff0c0');
</script>
</body>
</html>
